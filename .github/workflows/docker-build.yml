name: Build and Push Docker Image

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}/claude-code

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally first
        uses: docker/build-push-action@v6
        with:
          context: ./claude-container
          push: false
          load: true
          provenance: false
          tags: ghcr.io/${{ env.IMAGE_NAME }}:local

      - name: Generate tags with Claude Code version
        id: tags
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=${GITHUB_SHA::7}
          # Use --entrypoint to bypass entrypoint.sh, extract version number only
          RAW=$(docker run --rm --entrypoint cat ghcr.io/${{ env.IMAGE_NAME }}:local /etc/claude-code-version 2>/dev/null || echo "unknown")
          VERSION=$(echo "$RAW" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          VERSION=${VERSION:-unknown}
          TAG="${DATE}-${SHA}-v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building tags: latest, ${TAG}"

      - name: Push with tags
        run: |
          docker tag ghcr.io/${{ env.IMAGE_NAME }}:local ghcr.io/${{ env.IMAGE_NAME }}:latest
          docker tag ghcr.io/${{ env.IMAGE_NAME }}:local ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.tag }}
          docker push ghcr.io/${{ env.IMAGE_NAME }}:latest
          docker push ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.tag }}
