name: Build and Push Docker Image

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}/claude-code

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: tags
        run: |
          DATE=$(date -u +%Y%m%d)
          SHA=${GITHUB_SHA::7}
          echo "tags=${DATE}-${SHA}" >> "$GITHUB_OUTPUT"
          echo "Building tags: latest, ${DATE}-${SHA}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./claude-container
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.tags }}
